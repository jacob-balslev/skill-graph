name: Publish @skill-graph/cli to npm

# Manual-gate release: the maintainer triggers this workflow from the GitHub
# Actions UI (or `gh workflow run`) after sanity-checking the tag, package
# contents, and CHANGELOG entry. Tag push alone no longer auto-publishes —
# the gate moved here from b32f1e4 (v0.5.8, the last auto-on-tag release).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.5.9). Must already exist on the remote.'
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
