name: Skill Graph Lint

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/skill-lint.js'
      - 'scripts/lint/**'
      - 'scripts/lib/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/skill-lint.js'
      - 'scripts/lint/**'
      - 'scripts/lib/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'

jobs:
  lint:
    name: Lint skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run skill lint
        run: node scripts/skill-lint.js --include-template

  contract-consistency:
    name: Contract consistency
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check contract consistency
        run: node scripts/check-contract-consistency.js

  routing-eval:
    name: Routing eval (asserted skills only)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate sample manifest
        run: node scripts/generate-manifest.js --include-template --timestamp 1970-01-01T00:00:00Z --output examples/skills.manifest.sample.json
      - name: Run routing harness on asserted skills
        run: node scripts/skill-graph-routing-eval.js --manifest examples/skills.manifest.sample.json --only-asserted
