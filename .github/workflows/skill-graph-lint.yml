name: Skill Graph Lint

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/skill-lint.js'
      - 'scripts/lint/**'
      - 'scripts/lib/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/skill-lint.js'
      - 'scripts/lint/**'
      - 'scripts/lib/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'

jobs:
  lint:
    name: Lint skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run skill lint
        run: node scripts/skill-lint.js --include-template

  contract-consistency:
    name: Contract consistency
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check contract consistency
        run: node scripts/check-contract-consistency.js
