name: Skill Graph Lint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/skill-graph-lint.yml'
      - 'bin/**'
      - 'skills/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'
      - 'README.md'
      - 'SKILL_GRAPH.md'
      - 'SKILL_METADATA_PROTOCOL.md'
      - 'SKILL_AUDIT_CHECKLIST.md'
      - 'SKILL_AUDIT_LOOP.md'
      - 'package.json'
  pull_request:
    paths:
      - '.github/workflows/skill-graph-lint.yml'
      - 'bin/**'
      - 'skills/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'examples/**'
      - 'docs/**'
      - 'README.md'
      - 'SKILL_GRAPH.md'
      - 'SKILL_METADATA_PROTOCOL.md'
      - 'SKILL_AUDIT_CHECKLIST.md'
      - 'SKILL_AUDIT_LOOP.md'
      - 'package.json'

jobs:
  verify:
    name: Verify Skill Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full verification gate
        run: pnpm run verify
